<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex — 1ª Geração Kanto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" href="https://play-lh.googleusercontent.com/LDbas6D6fLVBOfwMhe8KS37WcXyhanxshxQO3LHXqmjUgoW2a-RQ5C9GPXoxVaAzKj8l" type="image/x-icon">
  <button class="back-to-top" id="back-to-top" title="Voltar ao topo">▲</button>

  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg: #0d0f1a;
      --bg2: #13162a;
      --bg3: #1a1f38;
      --surface: #1e2440;
      --surface2: #252c4a;
      --border: #2e3660;
      --accent: #e63946;
      --accent2: #ff6b6b;
      --gold: #ffd166;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --text-dim: #4a5278;
      --radius: 16px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --glow: 0 0 20px rgba(230, 57, 70, 0.3);
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);

      /* Type colors */
      --Normal: #a8a878;
      --Fire: #f08030;
      --Water: #6890f0;
      --Electric: #f8d030;
      --Grass: #78c850;
      --Ice: #98d8d8;
      --Fighting: #c03028;
      --Poison: #a040a0;
      --Ground: #e0c068;
      --Flying: #a890f0;
      --Psychic: #f85888;
      --Bug: #a8b820;
      --Rock: #b8a038;
      --Ghost: #705898;
      --Dragon: #7038f8;
    }

    /* ===== LIGHT THEME ===== */
    body.light {
      --bg: #f0f2ff;
      --bg2: #e4e8ff;
      --bg3: #d8dcf5;
      --surface: #ffffff;
      --surface2: #eceffe;
      --border: #c8cef0;
      --text: #1a1f3a;
      --text-muted: #4a5278;
      --text-dim: #8892b0;
    }

    body.light body::before {
      display: none;
    }

    /* ===== THEME TOGGLE BUTTON ===== */
    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 52px;
      height: 52px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      padding: 4px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    .theme-toggle:hover {
      transform: rotate(20deg) scale(1.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .theme-toggle img {
      width: 40px;
      height: 40px;
      image-rendering: pixelated;
    }

    header {
      position: relative;
    }

    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(230, 57, 70, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(104, 144, 240, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(30, 36, 64, 0.8) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== HEADER ===== */
    header {
      position: relative;
      z-index: 10;
      padding: 48px 24px 36px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(13, 15, 26, 0.9) 0%, transparent 100%);
    }

    .header-pokeball {
      width: 60px;
      height: 60px;
      margin: 0 auto 20px;
      position: relative;
      animation: spin 8s linear infinite;
    }

    .header-pokeball svg {
      width: 100%;
      height: 100%;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    header h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(14px, 3vw, 22px);
      color: var(--accent);
      text-shadow: 0 0 30px rgba(230, 57, 70, 0.6), 2px 2px 0 rgba(0, 0, 0, 0.8);
      letter-spacing: 2px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    header p {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
    }

    .pokemon-count {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 13px;
      color: var(--gold);
      font-weight: 800;
      margin-top: 10px;
    }

    /* ===== SEARCH ===== */
    .search-bar {
      position: relative;
      z-index: 10;
      max-width: 500px;
      margin: 28px auto 0;
      padding: 0 24px;
    }

    .search-bar input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 14px 24px 14px 48px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 600;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
    }

    .search-bar input::placeholder {
      color: var(--text-dim);
    }

    .search-icon {
      position: absolute;
      left: 42px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 18px;
      pointer-events: none;
    }

    /* ===== MAIN LAYOUT ===== */
    main {
      position: relative;
      z-index: 5;
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ===== TYPE FILTERS ===== */
    .filter-section {
      margin-bottom: 36px;
    }

    .filter-section h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 3px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      padding: 7px 16px;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .filter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .filter-btn:hover::before {
      opacity: 1;
    }

    .filter-btn.active {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3), var(--shadow);
      transform: translateY(-2px);
    }

    .filter-btn-all {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .filter-btn-all.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 12px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      flex-wrap: wrap;
      gap: 8px;
    }

    .stats-bar span {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .stats-bar strong {
      color: var(--gold);
    }

    /* ===== VIEW TOGGLE ===== */
    .view-toggle {
      display: flex;
      gap: 6px;
    }

    .view-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all var(--transition);
    }

    .view-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ===== GRID / TABLE CONTAINER ===== */
    #pokemon-container {
      transition: opacity 0.25s ease;
    }

    #pokemon-container.loading {
      opacity: 0.4;
    }

    /* ===== CARDS GRID ===== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    /* ===== POKEMON CARD ===== */
    .pokemon-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.4s ease both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .pokemon-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(255, 255, 255, 0.03) 100%);
      pointer-events: none;
    }

    .pokemon-card:hover {
      transform: translateY(-6px);
      border-color: var(--type-color, var(--accent));
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--type-color, var(--accent));
    }

    .card-number {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .card-sprite {
      width: 96px;
      height: 96px;
      margin: 0 auto 12px;
      display: block;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
      transition: transform 0.3s ease;
    }

    .pokemon-card:hover .card-sprite {
      transform: scale(1.12) translateY(-4px);
    }

    .card-name {
      font-weight: 900;
      font-size: 16px;
      text-align: center;
      margin-bottom: 10px;
      color: var(--text);
    }

    .type-badges {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .type-badge {
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: white;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    .card-info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .card-info-label {
      color: var(--text-dim);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 60px;
    }

    .card-info-value {
      color: var(--text-muted);
      font-weight: 600;
      text-align: right;
      font-size: 11px;
    }

    .weakness-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: flex-end;
    }

    .weakness-chip {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 800;
      color: white;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .weakness-4x {
      outline: 2px solid rgba(255, 255, 255, 0.5);
    }

    /* ===== TABLE VIEW ===== */
    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 14px 16px;
      text-align: left;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    th.sortable:hover {
      color: var(--text);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    tbody tr:hover {
      background: var(--surface2);
      cursor: pointer;
    }

    td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    .td-num {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--text-dim);
    }

    .td-sprite {
      width: 48px;
      height: 48px;
      image-rendering: pixelated;
      display: block;
    }

    .td-name {
      font-weight: 800;
      font-size: 14px;
    }

    .td-ability {
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 7, 15, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      transform: scale(0.92) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
    }

    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 32px 32px 24px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .modal-close:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .modal-number {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .modal-title {
      font-weight: 900;
      font-size: 28px;
      color: var(--text);
      margin-bottom: 12px;
    }

    .modal-sprite {
      width: 120px;
      height: 120px;
      image-rendering: pixelated;
      float: right;
      margin: -60px 0 0 20px;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
    }

    .modal-body {
      padding: 24px 32px 32px;
    }

    .modal-section {
      margin-bottom: 24px;
    }

    .modal-section-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .ability-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ability-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
    }

    .ability-tag {
      font-size: 9px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      background: var(--bg3);
      color: var(--text-dim);
    }

    .ability-tag.hidden {
      background: rgba(248, 88, 136, 0.15);
      color: var(--accent2);
    }

    .evo-chain {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .evo-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: transform var(--transition);
    }

    .evo-step:hover {
      transform: scale(1.08);
    }

    .evo-step img {
      width: 56px;
      height: 56px;
      image-rendering: pixelated;
    }

    .evo-step-name {
      font-size: 11px;
      font-weight: 800;
      color: var(--text);
    }

    .evo-step-num {
      font-size: 9px;
      color: var(--text-dim);
      font-family: 'Press Start 2P', monospace;
    }

    .evo-arrow {
      color: var(--text-dim);
      font-size: 20px;
    }

    .evo-method {
      font-size: 9px;
      color: var(--gold);
      font-weight: 800;
      background: rgba(255, 209, 102, 0.1);
      border: 1px solid rgba(255, 209, 102, 0.2);
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
    }

    .evo-arrow-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .weakness-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .weakness-item {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      color: white;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .mult-label {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 9px;
    }

    .moves-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 6px;
    }

    .move-item {
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .move-level {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-dim);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .empty-state p {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .empty-state span {
      font-size: 13px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }

    /* ===== ABILITY DROPDOWN ===== */
    .ability-item {
      flex-direction: column;
      align-items: stretch;
      cursor: pointer;
      user-select: none;
      gap: 0;
      padding: 0;
      overflow: hidden;
    }

    .ability-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      transition: background var(--transition);
    }

    .ability-item:hover .ability-header {
      background: var(--surface2);
    }

    .ability-arrow {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }

    .ability-item.open .ability-arrow {
      transform: rotate(180deg);
    }

    .ability-desc {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), padding 0.25s ease;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      padding: 0 12px;
      border-top: 0px solid var(--border);
    }

    .ability-item.open .ability-desc {
      max-height: 120px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }


    /* ===== BACK TO TOP ===== */
    .back-to-top {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 48px;
      height: 48px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      box-shadow: 0 4px 20px rgba(230, 57, 70, 0.5);
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 999;
    }

    .back-to-top.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    .back-to-top:hover {
      background: var(--accent2);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(230, 57, 70, 0.6);
    }

    /* ===== MOVE TOOLTIP ===== */
    .move-item {
      position: relative;
    }

    .move-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
      white-space: nowrap;
      max-width: 220px;
      width: 150px;
      white-space: normal;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transform: translateX(-50%) translateY(4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .move-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--border);
    }

    .move-item:hover .move-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }

      header h1 {
        font-size: 11px;
      }

      .modal-body {
        padding: 20px;
      }

      .modal-header {
        padding: 24px 20px 20px;
      }
    }
  </style>
</head>

    // =====================================================
    // SPRITE URL HELPER (PokeAPI sprites)
    // =====================================================
    function spriteUrl(id) {
      return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    }

    // =====================================================
    // TYPE COLORS
    // =====================================================
    const TYPE_COLORS = {
      Normal: "#a8a878", Fire: "#f08030", Water: "#6890f0", Electric: "#f8d030",
      Grass: "#78c850", Ice: "#98d8d8", Fighting: "#c03028", Poison: "#a040a0",
      Ground: "#e0c068", Flying: "#a890f0", Psychic: "#f85888", Bug: "#a8b820",
      Rock: "#b8a038", Ghost: "#705898", Dragon: "#7038f8"
    };

    // =====================================================
    // APP STATE
    // =====================================================
    let activeType = "All";
    let viewMode = "card"; // "card" | "table"
    let searchQuery = "";
    let sortCol = "id";
    let sortDir = 1;

    // =====================================================
    // ALL TYPES (from data)
    // =====================================================
    const ALL_TYPES = [...new Set(POKEMON_DATA.flatMap(p => p.types))].sort();

    // =====================================================
    // FILTER LOGIC
    // =====================================================
    function getFiltered() {
      return POKEMON_DATA.filter(p => {
        const matchType = activeType === "All" || p.types.includes(activeType);
        const matchSearch = !searchQuery ||
          p.name.toLowerCase().includes(searchQuery) ||
          String(p.id).includes(searchQuery);
        return matchType && matchSearch;
      }).sort((a, b) => {
        if (sortCol === "id") return (a.id - b.id) * sortDir;
        if (sortCol === "name") return a.name.localeCompare(b.name) * sortDir;
        return 0;
      });
    }

    // =====================================================
    // RENDER FILTER BUTTONS
    // =====================================================
    function renderFilters() {
      const container = document.getElementById("filter-buttons");
      const allBtn = document.createElement("button");
      allBtn.className = `filter-btn filter-btn-all ${activeType === "All" ? "active" : ""}`;
      allBtn.textContent = "⭐ Todos";
      allBtn.onclick = () => { activeType = "All"; render(); };
      container.appendChild(allBtn);

      ALL_TYPES.forEach(type => {
        const btn = document.createElement("button");
        btn.className = `filter-btn ${activeType === type ? "active" : ""}`;
        btn.textContent = type;
        btn.style.background = TYPE_COLORS[type] || "#888";
        btn.style.color = "white";
        btn.onclick = () => { activeType = type; render(); };
        container.appendChild(btn);
      });
    }

    // =====================================================
    // RENDER CARDS
    // =====================================================
    function renderCards(pokemon) {
      const grid = document.createElement("div");
      grid.className = "cards-grid";

      pokemon.forEach((p, i) => {
        const card = document.createElement("div");
        card.className = "pokemon-card";
        const color = TYPE_COLORS[p.types[0]] || "#888";
        card.style.setProperty("--type-color", color);
        card.style.animationDelay = `${Math.min(i * 0.04, 0.6)}s`;

        const abilities = [
          ...p.abilities,
          ...(p.hiddenAbility ? [p.hiddenAbility + " (H)"] : [])
        ].join(", ");

        const evoNames = p.evolution.chain.map(id => {
          const evo = POKEMON_DATA.find(x => x.id === id);
          return evo ? evo.name : "?";
        });
        const evoText = evoNames.length > 1 ? evoNames.join(" → ") : "Sem evolução";

        const weaknesses = [
          ...(p.weaknesses["4x"] || []).map(t => `<span class="weakness-chip weakness-4x" style="background:${TYPE_COLORS[t] || "#888"}">${t} 4×</span>`),
          ...(p.weaknesses["2x"] || []).map(t => `<span class="weakness-chip" style="background:${TYPE_COLORS[t] || "#888"}">${t} 2×</span>`)
        ].join("") || "<span style='color:var(--text-dim);font-size:11px'>Nenhuma</span>";

        card.innerHTML = `
      <div class="card-number">#${String(p.id).padStart(3, "0")}</div>
      <img class="card-sprite" src="${spriteUrl(p.id)}" alt="${p.name}" loading="lazy" />
      <div class="card-name">${p.name}</div>
      <div class="type-badges">${p.types.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t] || "#888"}">${t}</span>`).join("")}</div>
      <div class="card-divider"></div>
      <div class="card-info-row">
        <span class="card-info-label">Ability</span>
        <span class="card-info-value">${p.abilities.join(", ")}</span>
      </div>
      <div class="card-info-row">
        <span class="card-info-label">Evolução</span>
        <span class="card-info-value" style="font-size:10px">${evoText}</span>
      </div>
      <div class="card-info-row">
        <span class="card-info-label">Fraquezas</span>
        <span class="card-info-value"><div class="weakness-chips">${weaknesses}</div></span>
      </div>
    `;
        card.onclick = () => openModal(p);
        grid.appendChild(card);
      });

      return grid;
    }

    // =====================================================
    // RENDER TABLE
    // =====================================================
    function renderTable(pokemon) {
      const wrapper = document.createElement("div");
      wrapper.className = "table-wrapper";

      const makeHeader = (label, col) => `<th class="sortable" data-col="${col}">${label} ${sortCol === col ? (sortDir > 0 ? "↑" : "↓") : ""}</th>`;

      const rows = pokemon.map(p => {
        const evoText = p.evolution.chain.length > 1
          ? p.evolution.chain.map(id => POKEMON_DATA.find(x => x.id === id)?.name || "?").join(" → ")
          : "—";
        const weakList = [
          ...(p.weaknesses["4x"] || []).map(t => `<span class="weakness-chip weakness-4x" style="background:${TYPE_COLORS[t] || "#888"};font-size:9px">${t}×4</span>`),
          ...(p.weaknesses["2x"] || []).map(t => `<span class="weakness-chip" style="background:${TYPE_COLORS[t] || "#888"};font-size:9px">${t}</span>`)
        ].join(" ");

        return `<tr onclick="openModalById(${p.id})">
      <td><img class="td-sprite" src="${spriteUrl(p.id)}" alt="${p.name}" loading="lazy"/></td>
      <td class="td-num">#${String(p.id).padStart(3, "0")}</td>
      <td class="td-name">${p.name}</td>
      <td><div class="type-badges" style="justify-content:flex-start">${p.types.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t] || "#888"}">${t}</span>`).join("")}</div></td>
      <td class="td-ability">${[...p.abilities, ...(p.hiddenAbility ? [p.hiddenAbility + " (H)"] : [])].join(", ")}</td>
      <td style="font-size:11px;color:var(--text-muted)">${evoText}</td>
      <td><div style="display:flex;flex-wrap:wrap;gap:3px">${weakList}</div></td>
    </tr>`;
      }).join("");

      wrapper.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Sprite</th>
          ${makeHeader("Nº", "id")}
          ${makeHeader("Nome", "name")}
          <th>Tipo(s)</th>
          <th>Abilities</th>
          <th>Evolução</th>
          <th>Fraquezas</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;

      wrapper.querySelectorAll("th.sortable").forEach(th => {
        th.onclick = () => {
          const col = th.dataset.col;
          if (sortCol === col) sortDir *= -1;
          else { sortCol = col; sortDir = 1; }
          render();
        };
      });

      return wrapper;
    }

    // =====================================================
    // MAIN RENDER
    // =====================================================
    function render() {
      // Update filter buttons
      document.getElementById("filter-buttons").innerHTML = "";
      renderFilters();

      const filtered = getFiltered();
      const container = document.getElementById("pokemon-container");
      container.innerHTML = "";

      document.getElementById("count-display").textContent = filtered.length;
      document.getElementById("active-filter-label").textContent =
        activeType !== "All" ? `Tipo: ${activeType}` : "";

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><p>🔍</p><p>Nenhum Pokémon encontrado</p><span>Tente outro filtro ou nome</span></div>`;
        return;
      }

      if (viewMode === "card") {
        container.appendChild(renderCards(filtered));
      } else {
        container.appendChild(renderTable(filtered));
      }
    }

      return `
    <div class="ability-item">
      <div class="ability-header">
        <span class="ability-tag ${isHidden ? "hidden" : ""}">${tag}</span>
        ${name}
        <span class="ability-arrow">▼</span>
      </div>
      <div class="ability-desc">${desc}</div>
    </div>`;
    }
    const POKEMON_DESCRIPTIONS = {
      1: "Uma semente estranha foi plantada em seu dorso ao nascer e cresce junto com ele. Absorve luz solar para se alimentar e libera um aroma adocicado ao redor. Quando está prestes a florescer, o cheiro fica mais intenso.",
      2: "O botão em seu dorso incha gradualmente conforme absorve luz solar. Um aroma adocicado exala quando está prestes a florescer completamente. Suas raízes ficam mais fortes e profundas a cada estágio.",

      4: "A chama na ponta de sua cauda indica seu estado de saúde — vacila quando está doente. Nasceu com essa chama e ela nunca se apaga, nem mesmo sob chuva forte. Quando irritado, a chama cresce e fica mais intensa.",
      5: "Quando fica bravo, cospe fogo intenso que derrete tudo ao redor rapidamente. Prefere habitar montanhas vulcânicas onde a temperatura é sempre elevada. Sua chama queima mais forte contra oponentes que considera dignos.",
      6: "Cospe fogo que queima tudo ao contato e voa procurando oponentes poderosos. Nunca cospe fogo em adversários mais fracos — tem um código de honra. Sua envergadura pode criar ventos fortes ao bater as asas.",
      7: "Após o nascimento, sua carapaça mole endurece gradualmente com o tempo. Brinca com água na beira de lagos, praticando a precisão de seus jatos. Quando em perigo, puxa rapidamente membros para dentro da carapaça.",
      8: "Frequentemente esconde-se na água para evitar oponentes mais fortes. Quando perseguido, dispara jatos d'água precisos para se defender. A carapaça espiral em sua cauda aumenta a pressão dos jatos disparados.",
      9: "Um Pokémon brutal com canhões de água embutidos em sua carapaça resistente. Pode disparar jatos que perfuram aço grosso com total facilidade. Sua precisão de mira é perfeita — nunca erra um alvo em movimento.",
      10: "Sua única meta na vida é comer folhas vorazmente o dia todo. Apesar de comer muito, não causa tantos danos às plantas ao redor. Seus mandíbulas pequenas são extremamente eficientes para mastigar.",
      11: "Fica completamente imóvel enquanto se prepara para a grande evolução. Sua casca é mais dura que rocha e protege o corpo em transformação. Por dentro, o corpo está sendo completamente reconstruído.",
      12: "Suas escamas largas e coloridas soltam pó venenoso quando agitadas. Voa elegantemente pelos jardins em busca de néctar das flores. Seus olhos compostos permitem enxergar em quase todas as direções.",
      13: "Frequentemente encontrado em florestas mastigando folhas avidamente. Cobre-se com veneno ao nascer para se proteger de predadores. Seu ferrão na cabeça está impregnado de veneno potente desde o nascimento.",
      14: "Fica completamente parado enquanto se prepara para evoluir no casulo. Aparenta estar dormindo, mas por dentro passa por grandes transformações. Sua casca amarela é muito mais resistente do que parece.",
      15: "Ataca em enxames furiosos se seu ninho for perturbado por intrusos. Persegue o inimigo implacavelmente por longas distâncias sem desistir. Seus ferrões duplos podem injetar veneno poderoso repetidamente.",
      16: "Um Pokémon muito comum em florestas e campos abertos por todo o mundo. Não é muito forte, mas possui sentidos extremamente aguçados para detectar perigos. Vive em bandos e se comunicam com cantos específicos.",
      17: "Muito territorial e agressivo com qualquer intruso em seu espaço aéreo. Persegue qualquer um que entre em seu território em alta velocidade. Suas garras são fortes o suficiente para segurar presas grandes.",
      18: "Quando suas asas enormes batem, criam tufões que derrubam árvores. Lidera grandes bandos de Pidgey e Pidgeotto com total autoridade. É capaz de voar a altitudes extremas sem demonstrar cansaço.",
      19: "Morde qualquer coisa com seus dentes afiados que nunca param de crescer. Constrói ninhos escondidos em locais difíceis de encontrar e acessar. Muito esperto — aprende rapidamente onde encontrar comida.",
      20: "Seus dentes nunca param de crescer, por isso rói objetos duros constantemente. Suas garras traseiras longas e curvadas facilitam escalar superfícies. Pode roer através de paredes de concreto com facilidade.",
      21: "Apesar de ser pequeno, é extremamente valente e corajoso em batalha. Briga contra Pokémon muito maiores sem hesitar nem um pouco. Seu bico afiado e garras são suas principais armas ofensivas.",
      22: "Com suas asas poderosas, voa a velocidades impressionantes sobre os campos. Usa seu bico longo como uma lança perfurante em combate direto. Tem a visão mais aguçada de todos os Pokémon do tipo Flying.",
      23: "Enrola-se ao redor de sua presa e aperta até ela perder os sentidos. Seus padrões corporais únicos intimidam oponentes antes do ataque. Pode imobilizar presas muito maiores com sua força de compressão.",
      24: "Os padrões em sua barriga variam por região, como dialetos regionais. Paralisa presas com seu olhar fixo e aterrorizante de cobra. Seu veneno é poderoso o suficiente para derrubar grandes Pokémon.",
      25: "Quando vários se reúnem, sua eletricidade combinada causa tempestades. Os sacos nas bochechas armazenam eletricidade que libera ao se defender. Guarda-se em florestas densas onde recarrega sua energia.",
      26: "Seu saco nas bochechas armazena eletricidade suficiente para derrubar um elefante. Quanto maior o saco, mais forte e perigoso é o choque liberado. Pode soltar raios de 100.000 volts quando em perigo.",
      27: "Rolando em bola perfeita, protege-se contra ataques poderosos facilmente. Vive em desertos áridos e quentes onde pouca coisa sobrevive. Suas garras duras escavam buracos rapidamente na areia compacta.",
      28: "Suas garras são tão afiadas que podem cortar qualquer material conhecido. Escava buracos no solo seco em segundos com movimentos precisos. Usa os buracos como armadilhas para capturar presas desatentas.",
      29: "Quieta e dócil com quem conhece, mas muito protetora dos companheiros. Ataca ferozmente com o chifre venenoso quando se sente ameaçada. Vive em grupos onde as fêmeas protegem os filhotes juntas.",
      30: "Muito protetora de sua família e território contra qualquer ameaça. Quando acuada sem saída, ataca ferozmente com garras e chifre. Seu veneno é mais potente que o de Nidoran♀ e piora com a raiva.",
      31: "Usando seus membros poderosos, pode derrubar uma casa inteira sem esforço. Protetora incansável e dedicada de seus filhotes e território sagrado. Seu veneno é letal e não existe antídoto comum para ele.",
      32: "Feroz e extremamente belicoso por natureza com qualquer intruso. Usa seu chifre venenoso para atacar qualquer coisa que se mova perto. Marca território com seu veneno para avisar outros Pokémon.",
      33: "Seu chifre envenena tudo que toca com veneno de ação rápida. Esfrega o chifre em troncos de árvores para afiá-lo constantemente. Libera feromonas para atrair Nidoran♀ durante o acasalamento.",
      34: "Sua cauda poderosa é forte o suficiente para derrubar um prédio. O veneno em seu chifre é extremamente letal e age em segundos. Protege ferozmente seu território usando veneno e força bruta.",
      35: "Todos se apaixonam por sua aparência adorável e expressão inocente. Seu canto é tão belo e melodioso que hipnotiza quem ouve. Corre a velocidades surpreendentes apesar de sua aparência frágil.",
      36: "Usa suas asas para voar com elegância incomparável pelos céus noturnos. Seu canto faz qualquer ser vivo sonhar feliz e pacificamente. Sua lua na testa brilha mais intensamente com a luz da lua cheia.",
      37: "Muito desconfiado e extremamente difícil de capturar na natureza selvagem. Se alguma de suas seis caudas for agarrada, usa poderes místicos para escapar. Aquece seu corpo com fogo interno nas noites frias.",
      38: "Diz-se que cada uma de suas nove caudas tem poderes divinos e mágicos. Vive por mil anos segundo antigas lendas e tradições populares. Quanto mais velha fica, mais belas ficam suas caudas douradas.",
      39: "Quando começa a cantar, absolutamente ninguém consegue parar de dormir. Tem pulmões imensamente grandes e resistentes para cantar por horas. Seu corpo macio e fofo é completamente irresistível ao toque.",
      40: "Suas orelhas grandes conseguem ouvir qualquer som a quilômetros. Enche o corpo com ar para se tornar o dobro do tamanho e intimidar. Seu pelo é tão macio que quem o toca não consegue mais largar.",
      41: "Vive em cavernas completamente escuras em grupos enormes de centenas. Sai somente à noite para se alimentar de insetos e frutos silvestres. Usa ultrassom para navegar no escuro com total perfeição.",
      42: "Voa velozmente mesmo em lugares completamente escuros sem se perder. Suas mandíbulas são fortes o suficiente para triturar ossos duros. Um único Golbat pode beber 10 xícaras de sangue em uma noite.",
      43: "Absorve nutrientes ricos do solo durante toda a noite enquanto dorme. Durante o dia, abre suas folhas para fazer fotossíntese eficientemente. Libera pó soporífero ao anoitecer para afastar predadores.",
      44: "O néctar que exala de sua flor tem um cheiro horrível e nauseante. Atrai insetos estranhos com esse aroma para realizar polinização. Usa esporos de sono para adormecer presas desatentas.",
      45: "O pólen de sua enorme flor pode causar alergias graves em humanos. É tão pesado que raramente se move da posição onde está parado. Libera esporos alucinógenos que confundem quem se aproxima.",
      46: "Os fungos em suas costas crescem exatamente da mesma forma que ele. Espora esporos venenosos quando se sente machucado ou ameaçado. Vive em florestas úmidas onde os fungos prosperam facilmente.",
      47: "Os fungos em suas costas controlam todo o seu corpo como marionete. Libera esporos venenosos e soporíferos quando ameaçado por inimigos. Ataca furiosamente para proteger os fungos que dependem dele.",
      48: "Seus olhos compostos gigantes enxergam claramente mesmo na escuridão total. Usa ultrassom para navegar perfeitamente à noite sem se perder. Seus pós têm efeitos variados — veneno, paralisia ou sonolência.",
      49: "Suas escamas de asa refletem luz de formas misteriosas e hipnóticas. Voa silenciosamente pela noite procurando flores para polinizar. Seus pós têm efeitos poderosos que paralisam ou adormecem oponentes.",
      50: "Escava túneis complexos a exatamente 1 metro abaixo do nível do solo. As vibrações que cria ao escavar podem ser sentidas na superfície. Três Diglett unidos formam um Dugtrio com três vezes mais poder.",
      51: "Três cabeças trabalham juntas em perfeita harmonia e sincronismo total. Escava túneis complexos com velocidade impressionante que surpreende a todos. Quando uma cabeça dorme, as outras duas ficam de guarda.",
      52: "Muito esperto, manhoso e oportunista em qualquer situação do dia a dia. Usa a moeda em sua testa para hipnotizar oponentes desatentos facilmente. Coleciona objetos brilhantes em locais secretos conhecidos só por ele.",
      53: "Caminha com elegância e cabeça sempre erguida com ar de superioridade. Usa suas garras retráteis para ataques rápidos e furtivos quando necessário. Seus bigodes sensoriais detectam qualquer mudança no ambiente.",
      54: "Embora pareça confuso e estúpido, é na verdade extremamente inteligente. Usa poderes psíquicos poderosos quando sofre de dores de cabeça intensas. A dor de cabeça paradoxalmente aumenta seu poder psíquico.",
      55: "Um excelente nadador que usa suas patas palmeadas para nadar a 93 km/h. Abre caminho nos corais com suas garras douradas e muito afiadas. Seus poderes psíquicos ficam mais fortes após nadar por horas.",
      56: "Sempre furioso e constantemente procurando uma boa briga com qualquer um. Vive em matilhas com hierarquia rígida baseada exclusivamente na força pura. Seu temperamento explosivo faz com que briga até com aliados.",
      57: "Extremamente agressivo e impetuoso em absolutamente qualquer situação. Nada no mundo consegue parar sua fúria quando está com raiva total. Treina incansavelmente para ficar mais forte que qualquer oponente.",
      58: "Fiel ao seu treinador como um cão de guarda leal e muito dedicado. Late para avisar sobre qualquer perigo que percebe ao redor dele. Ama brincar, mas leva batalhas muito a sério quando necessário.",
      59: "Corre a incríveis 240 km/h sem demonstrar absolutamente nenhum cansaço. A juba de fogo cresce mais bela e impressionante à medida que envelhece. É considerado sagrado em algumas regiões por sua beleza.",
      60: "O espiral em sua barriga gira no sentido horário no hemisfério norte. No hemisfério sul, o espiral gira curiosamente no sentido anti-horário. Usa hipnose para adormecer presas antes de capturá-las com calma.",
      61: "Quando o clima esfria, abandona a água e passa a caminhar pela terra. Pode usar hipnose para adormecer oponentes em questão de segundos. Sua pele escorregadia torna quase impossível agarrá-lo com firmeza.",
      62: "Seu corpo é mais duro que pedra sólida após anos de treinamento intenso. Treina incessantemente no fundo de rios para aumentar força e resistência. Pode bloquear qualquer golpe físico com seus braços musculosos.",
      63: "Dorme incríveis 18 horas por dia sem qualquer interrupção ou descanso. Usa seus poderes psíquicos poderosos mesmo enquanto está dormindo profundamente. As colheres que segura amplificam sua energia psíquica muito.",
      64: "Emite ondas de poder psíquico intensas a partir de suas colheres brilhantes. Pode dobrar metais grossos com apenas o poder de sua mente concentrada. Sua colher torce mais quanto maior é seu poder psíquico.",
      65: "Sua inteligência supera a de qualquer supercomputador existente no mundo. Memoriza absolutamente tudo que vê, ouve ou aprende permanentemente. Pode realizar cálculos extremamente complexos em milissegundos.",
      66: "Levanta pesos enormes como simples exercício de aquecimento diário. Apesar de sua força descomunal, é extremamente gentil com os mais fracos. Ajuda Pokémon menores carregando-os quando estão cansados demais.",
      67: "Usa uma cinta muscular especial para conter e controlar seu enorme poder. Ajuda os mais fracos com sua força sem pedir absolutamente nada em troca. Sua força é tanta que precisa se controlar conscientemente.",
      68: "Possui quatro braços poderosos que nunca param de se mover em batalha. Pode executar 1000 socos precisos em apenas 2 segundos inacreditavelmente. Nenhum Pokémon consegue bloquear todos os seus socos ao mesmo tempo.",
      69: "Vive em pântanos tropicais úmidos onde há muitos nutrientes no solo. Suas raízes sugam nutrientes do solo constantemente durante o dia e noite. Pode engolir insetos inteiros com sua boca em forma de chicote.",
      70: "Suas folhas em forma de lâmina afiada podem cortar qualquer coisa facilmente. Solta ácido corrosivo de sua boca para dissolver presas de grande porte. Seu corpo flexível permite atacar de ângulos completamente inesperados.",
      71: "Digere presas inteiras com seu ácido estomacal extremamente forte e corrosivo. Atrai vítimas desatentas com seu cheiro adocicado e completamente irresistível. Uma vez dentro, é impossível escapar de seu estômago.",
      72: "Seu corpo é composto por impressionantes 98% de água pura e cristalina. Flutua passivamente na corrente oceânica comendo plâncton microscópico. Seus tentáculos venenosos podem se estender 30 metros para capturar presas.",
      73: "Possui 80 tentáculos extremamente venenosos e absolutamente mortais. Pode paralisar completamente qualquer oponente com seu veneno potente. É considerado um dos Pokémon mais perigosos de todos os oceanos.",
      74: "Geralmente encontrado em cavernas escuras e túneis subterrâneos profundos. Rola por inclinações íngremes para atacar oponentes com grande força. Seu corpo é feito de minerais preciosos comprimidos por pressão.",
      75: "Seu corpo maciço é feito de rocha completamente sólida e resistente. Quando em grupos, rolam em formação para esmagar inimigos juntos. Cada um pesa tanto quanto dez adultos humanos somados.",
      76: "Uma vez que começa a rolar, absolutamente nada no mundo pode pará-lo. Sua força descomunal é capaz de demolir montanhas inteiras gradualmente. Explode com força devastadora quando ameaçado sem saída.",
      77: "Seus cascos são tão duros que não deixam nenhuma marca ao galopar. Corre em grupos pelo campo criando um espetáculo impressionante de fogo. Sua crina fica completamente em chamas ao atingir velocidade máxima.",
      78: "Corre a incríveis 240 km/h sem demonstrar absolutamente nenhum cansaço. Sua juba fica totalmente em chamas quando galopa em velocidade máxima. Não sente absolutamente nenhuma dor em batalha pela sua resistência.",
      79: "Extremamente lento e preguiçoso em absolutamente tudo que faz. Só reage a estímulos externos após 5 segundos de atraso perceptível. Gosta de ficar parado em água morna tomando sol o dia todo.",
      80: "Tem um Shellder preso em sua cauda que libera veneno continuamente. O veneno do Shellder aumenta seus poderes psíquicos significativamente. Apesar de lento, seus poderes psíquicos são excepcionalmente poderosos.",
      81: "Criado espontaneamente por campos magnéticos intensos presentes na Terra. Vive perto de usinas de energia onde absorve eletricidade livremente. Flutua no ar usando magnetismo, nunca precisando tocar o chão.",
      82: "Três Magnemite unidos por força magnética intensa formam este Pokémon. A força magnética triplica ao anoitecer quando ficam mais ativos. Podem causar apagões em cidades inteiras quando estão com fome.",
      83: "Sempre carrega um talo fresco de cebolinha para onde quer que vá. Se o talo for roubado, fica tão triste que se recusa completamente a batalhar. Usa o talo como arma e instrumento musical ocasionalmente.",
      84: "Um Pokémon de duas cabeças que pensa com ambas simultaneamente e bem. Corre a impressionantes 150 km/h com suas duas pernas muito poderosas. As duas cabeças raramente concordam, mas lutam perfeitamente juntas.",
      85: "Suas três cabeças raramente concordam sobre qualquer assunto entre si. Apenas uma cabeça dorme de cada vez enquanto as outras vigiam atentamente. Cada cabeça tem uma personalidade completamente diferente das outras.",
      86: "Adora o frio extremo e nada velozmente nos oceanos árticos gelados. Sua língua é completamente azul por causa das temperaturas muito frias. Dorme flutuando no gelo enquanto nada lentamente com a corrente.",
      87: "Dorme profundamente no gelo enquanto nada pelas águas árticas geladas. Quando dorme muito profundamente, seu chifre brilha na escuridão total. Seu chifre tem propriedades curativas segundo antigas lendas locais.",
      88: "Vive em esgotos, lixões e qualquer lugar com muito lixo tóxico presente. Seu corpo é feito de lixo tóxico que muda de forma constantemente. Cresce mais forte absorvendo poluentes e substâncias tóxicas do ambiente.",
      89: "Cresce continuamente absorvendo mais lixo e poluentes do meio ambiente. Seu cheiro é tão horrível que pode causar desmaios em humanos próximos. Libera gases tóxicos que mascaram completamente seu paradeiro.",
      90: "Abre e fecha sua concha rapidamente para se propulsionar na água. Sua língua azul congela instantaneamente tudo que toca a -50°C. Quando agitado, dispara jatos de água gelada a alta pressão.",
      91: "Suas conchas sobrepostas são tão duras que nenhum golpe as penetra. Dispara espinhos afiados como balas a alta velocidade com precisão total. Uma vez que fecha a concha, é impossível abri-la de fora.",
      92: "Nascido do espírito de pessoas e Pokémon que morreram tragicamente. Pode passar por paredes e objetos sólidos como se não existissem. Drena calor e energia vital de qualquer ser vivo que tocar.",
      93: "Espreita no escuro esperando almas desavisadas e completamente solitárias. Seu toque gelado drena instantaneamente todo o calor corporal da vítima. Ri de forma perturbadora enquanto observa suas vítimas sofrerem.",
      94: "Adorado por médiuns e especialistas em fenômenos sobrenaturais diversos. Seu riso diabólico e perturbador aterroriza qualquer pessoa que ouça. Passa por paredes com facilidade e pode tornar-se invisível à vontade.",
      95: "Seu corpo é feito de rocha comprimida durante milhões de anos geológicos. Troca sua pele externa de pedra regularmente como uma cobra faz. Sua cauda de pedra pode partir rochas enormes com um único golpe.",
      96: "Come os sonhos das pessoas enquanto dormem profundamente à noite. Prefere muito mais sonhos doces e agradáveis a pesadelos assustadores. Guarda os sonhos que come em seu pêndulo para apreciá-los depois.",
      97: "Carrega um pêndulo brilhante que usa para hipnotizar qualquer pessoa. Quanto mais pesado o pêndulo, mais poderoso e preciso é o hipnotismo. Pode fazer qualquer ser vivo dormir com apenas alguns movimentos.",
      98: "Extremamente territorial com qualquer intruso que entre em seu habitat. Usa suas pinças afiadas para lutar ferozmente por seu território. Uma pinça é usada para atacar e a outra para se defender simultaneamente.",
      99: "Uma pinça é dramaticamente maior e mais poderosa que a outra pinça. A maior é tão forte que pode esmagar uma bola de boliche facilmente. Usa a pinça menor para tarefas delicadas e a maior para lutar.",
      100: "Criado acidentalmente por um cientista distraído em seu laboratório. Explode com raiva incontrolável quando seu medidor de carga está cheio. Reproduz-se quando dois Voltorb se encostam e um deles explode.",
      101: "Tão eletricamente carregado que toca em absolutamente nada sem descarregar. Explode violentamente se ficar carregado demais sem conseguir descarregar. Mais rápido que Voltorb — pode explodir antes de qualquer reação.",
      102: "Seis ovos unidos formam seu corpo como um grupo completamente inseparável. Dormem e acordam sempre em perfeita sincronia sem qualquer exceção. Protegem-se usando hipnose coletiva quando ameaçados por predadores.",
      103: "Planta sementes de si mesmo ao se mover pelo ambiente ao redor. Usa poderes psíquicos para se comunicar com os ovos em seu corpo. Seus olhos estão nos ovos e podem ver em todas as direções.",
      104: "Usa o crânio de sua mãe morta como capacete protetor e símbolo. Chora de saudades de sua mãe nas noites de lua cheia completamente sozinho. Seu choro ressoa estranhamente pelo ambiente como gemidos sobrenaturais.",
      105: "O crânio que usa como capacete pertencia a sua amada mãe falecida. Chora em noites de lua cheia com um lamento de tom sobrenatural. O osso que usa como arma foi herdado de sua mãe como lembrança.",
      106: "Seus chutes são tão velozes que se tornam completamente invisíveis ao olho. Pratica seus chutes 10.000 vezes por dia sem parar absolutamente nunca. Pode esticar suas pernas para o dobro do tamanho em batalha.",
      107: "Seus socos são tão rápidos que aparecem apenas como borrões no ar. Treina seus punhos na chuva forte para endurecê-los ao máximo possível. Nunca usa as pernas em batalha — confia apenas em seus punhos.",
      108: "Sua língua longa pode agarrar qualquer coisa a 10 metros de distância. Memoriza absolutamente tudo que toca ou prova com sua língua sensível. Sua língua é mais sensitiva que seus próprios olhos.",
      109: "Flutuando pelo ar, libera gás venenoso que faz qualquer um adoecer. Seu corpo gasoso pode se espremer por qualquer abertura por menor que seja. Torna-se ainda mais perigoso ao comprimir seus gases internos.",
      110: "Dois Koffing que se fundiram formam este curioso Pokémon duplo. Os dois rostos sorriem constantemente mesmo liberando gás altamente tóxico. Os gases dos dois corpos se misturam criando venenos mais potentes.",
      111: "Sua pele é tão incrivelmente dura que nem uma explosão a arranha. Corre atropelando absolutamente tudo em seu caminho sem desviar nunca. Seu chifre pode perfurar qualquer material, incluindo aço e rocha.",
      112: "Pode derrubar um caminhão grande com uma simples rasteira poderosa. Sua pele endurecida resiste a absolutamente qualquer golpe sem sofrer dano. Seu chifre é mais duro que diamante e perfura qualquer coisa.",
      113: "O ovo que carrega está cheio de nutrientes altamente concentrados e ricos. Partilha o ovo com Pokémon doentes e feridos para curá-los rapidamente. Um único ovo contém nutrientes suficientes para alimentar 50 pessoas.",

    function openModal(p) {
      const overlay = document.getElementById("modal-overlay");
      document.getElementById("modal-number").textContent = `#${String(p.id).padStart(3, "0")}`;
      document.getElementById("modal-title").textContent = p.name;
      document.getElementById("modal-sprite").src = spriteUrl(p.id);
      document.getElementById("modal-sprite").alt = p.name;

      // Descrição
      let descEl = document.getElementById("modal-desc");
      if (!descEl) {
        descEl = document.createElement("p");
        descEl.id = "modal-desc";
        descEl.style.cssText = "font-size:13px;color:var(--text-muted);line-height:1.6;margin-top:8px;font-style:italic;";
        document.getElementById("modal-title").after(descEl);
      }
      descEl.textContent = POKEMON_DESCRIPTIONS[p.id] || "";
      // Types
      const typesEl = document.getElementById("modal-types");
      typesEl.innerHTML = p.types.map(t =>
        `<span class="type-badge" style="background:${TYPE_COLORS[t] || "#888"}">${t}</span>`
      ).join("");

      // Header gradient
      const headerEl = document.getElementById("modal-header");
      const color = TYPE_COLORS[p.types[0]] || "#888";
      headerEl.style.background = `linear-gradient(135deg, ${color}18 0%, transparent 70%)`;
      headerEl.style.borderBottom = `1px solid ${color}33`;

      // Abilities
      const abEl = document.getElementById("modal-abilities");
      abEl.innerHTML = [
        ...p.abilities.map(a => buildAbilityItem("Normal", a)),
        ...(p.hiddenAbility ? [buildAbilityItem("Oculta", p.hiddenAbility, true)] : [])
      ].join("");

      // Adiciona toggle
      abEl.querySelectorAll(".ability-item").forEach(item => {
        item.addEventListener("click", () => {
          const isOpen = item.classList.contains("open");
          abEl.querySelectorAll(".ability-item").forEach(i => i.classList.remove("open"));
          if (!isOpen) item.classList.add("open");
        });
      });

      // Evolution chain
      const evoEl = document.getElementById("modal-evo");
      if (p.evolution.chain.length <= 1) {
        evoEl.innerHTML = `<span style="color:var(--text-dim);font-size:13px">Este Pokémon não evolui.</span>`;
      } else {
        evoEl.innerHTML = p.evolution.chain.map((id, i) => {
          const evo = POKEMON_DATA.find(x => x.id === id);
          if (!evo) return "";
          const method = p.evolution.methods[i - 1] || "";
          const arrow = i > 0 ? `<div class="evo-arrow-col"><span class="evo-arrow">→</span><span class="evo-method">${method}</span></div>` : "";
          return `${arrow}<div class="evo-step" onclick="openModalById(${id})">
        <img src="${spriteUrl(id)}" alt="${evo.name}"/>
        <span class="evo-step-name">${evo.name}</span>
        <span class="evo-step-num">#${String(id).padStart(3, "0")}</span>
      </div>`;
        }).join("");
      }

      // Weaknesses
      const wkEl = document.getElementById("modal-weaknesses");
      const all4x = (p.weaknesses["4x"] || []).map(t =>
        `<div class="weakness-item" style="background:${TYPE_COLORS[t] || "#888"}">${t} <span class="mult-label">4×</span></div>`);
      const all2x = (p.weaknesses["2x"] || []).map(t =>
        `<div class="weakness-item" style="background:${TYPE_COLORS[t] || "#888"}">${t} <span class="mult-label">2×</span></div>`);
      wkEl.innerHTML = [...all4x, ...all2x].join("") || `<span style="color:var(--text-dim);font-size:13px">Nenhuma</span>`;

      // Resistances
      const rsEl = document.getElementById("modal-resistances");
      const immune = (p.resistances.immune || []).map(t =>
        `<div class="weakness-item" style="background:#333;border:1px solid #555">${t} <span class="mult-label">0×</span></div>`);
      const quart = (p.resistances["0.25x"] || []).map(t =>
        `<div class="weakness-item" style="background:${TYPE_COLORS[t] || "#888"};opacity:0.7">${t} <span class="mult-label">¼×</span></div>`);
      const half = (p.resistances["0.5x"] || []).map(t =>
        `<div class="weakness-item" style="background:${TYPE_COLORS[t] || "#888"};opacity:0.6">${t} <span class="mult-label">½×</span></div>`);
      rsEl.innerHTML = [...immune, ...quart, ...half].join("") || `<span style="color:var(--text-dim);font-size:13px">Nenhuma</span>`;

      const lvEl = document.getElementById("modal-level-moves");
      lvEl.innerHTML = (p.levelMoves || []).map(m =>
        `<div class="move-item">
      ${m.move}
      <span class="move-level">Lv.${m.lv}</span>
      <div class="move-tooltip">${MOVE_DESCRIPTIONS[m.move] || "Descrição não disponível."}</div>
    </div>`
      ).join("") || `<span style="color:var(--text-dim);font-size:12px">Nenhum</span>`;



      // TM Moves
      const tmEl = document.getElementById("modal-tm-moves");
      tmEl.innerHTML = (p.tmMoves || []).map(m =>
        `<div class="move-item">
      ${m}
      <div class="move-tooltip">${MOVE_DESCRIPTIONS[m] || "Descrição não disponível."}</div>
    </div>`
      ).join("") || `<span style="color:var(--text-dim);font-size:12px">Nenhum</span>`;

      overlay.classList.add("open");
      document.body.style.overflow = "hidden";

      // Scroll modal to top
      document.getElementById("modal").scrollTop = 0;
    }

    function openModalById(id) {
      const p = POKEMON_DATA.find(x => x.id === id);
      if (p) openModal(p);
    }

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("open");
      document.body.style.overflow = "";
    }

    // =====================================================
    // EVENT LISTENERS
    // =====================================================
    document.getElementById("modal-close").onclick = closeModal;
    document.getElementById("modal-overlay").onclick = (e) => {
      if (e.target === e.currentTarget) closeModal();
    };
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    document.getElementById("search-input").oninput = (e) => {
      searchQuery = e.target.value.toLowerCase().trim();
      render();
    };

    document.getElementById("btn-card").onclick = () => {
      viewMode = "card";
      document.getElementById("btn-card").classList.add("active");
      document.getElementById("btn-table").classList.remove("active");
      render();
    };

    document.getElementById("btn-table").onclick = () => {
      viewMode = "table";
      document.getElementById("btn-table").classList.add("active");
      document.getElementById("btn-card").classList.remove("active");
      render();
    };

    const btt = document.getElementById("back-to-top");
    window.addEventListener("scroll", () => {
      btt.classList.toggle("visible", window.scrollY > 300);
    });
    btt.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    // =====================================================
    // INIT
    // =====================================================
    renderFilters();
    render();
  </script>
