<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex — 1ª Geração Kanto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" href="https://play-lh.googleusercontent.com/LDbas6D6fLVBOfwMhe8KS37WcXyhanxshxQO3LHXqmjUgoW2a-RQ5C9GPXoxVaAzKj8l" type="image/x-icon">
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg: #0d0f1a;
      --bg2: #13162a;
      --bg3: #1a1f38;
      --surface: #1e2440;
      --surface2: #252c4a;
      --border: #2e3660;
      --accent: #e63946;
      --accent2: #ff6b6b;
      --gold: #ffd166;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --text-dim: #4a5278;
      --radius: 16px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --glow: 0 0 20px rgba(230, 57, 70, 0.3);
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);

      /* Type colors */
      --Normal: #a8a878;
      --Fire: #f08030;
      --Water: #6890f0;
      --Electric: #f8d030;
      --Grass: #78c850;
      --Ice: #98d8d8;
      --Fighting: #c03028;
      --Poison: #a040a0;
      --Ground: #e0c068;
      --Flying: #a890f0;
      --Psychic: #f85888;
      --Bug: #a8b820;
      --Rock: #b8a038;
      --Ghost: #705898;
      --Dragon: #7038f8;
    }

    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(230, 57, 70, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(104, 144, 240, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(30, 36, 64, 0.8) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== HEADER ===== */
    header {
      position: relative;
      z-index: 10;
      padding: 48px 24px 36px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(13, 15, 26, 0.9) 0%, transparent 100%);
    }

    .header-pokeball {
      width: 60px;
      height: 60px;
      margin: 0 auto 20px;
      position: relative;
      animation: spin 8s linear infinite;
    }

    .header-pokeball svg {
      width: 100%;
      height: 100%;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    header h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(14px, 3vw, 22px);
      color: var(--accent);
      text-shadow: 0 0 30px rgba(230, 57, 70, 0.6), 2px 2px 0 rgba(0, 0, 0, 0.8);
      letter-spacing: 2px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    header p {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
    }

    .pokemon-count {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 13px;
      color: var(--gold);
      font-weight: 800;
      margin-top: 10px;
    }

    /* ===== SEARCH ===== */
    .search-bar {
      position: relative;
      z-index: 10;
      max-width: 500px;
      margin: 28px auto 0;
      padding: 0 24px;
    }

    .search-bar input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 14px 24px 14px 48px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 600;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
    }

    .search-bar input::placeholder {
      color: var(--text-dim);
    }

    .search-icon {
      position: absolute;
      left: 42px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 18px;
      pointer-events: none;
    }

    /* ===== MAIN LAYOUT ===== */
    main {
      position: relative;
      z-index: 5;
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ===== TYPE FILTERS ===== */
    .filter-section {
      margin-bottom: 36px;
    }

    .filter-section h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 3px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      padding: 7px 16px;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: all var(--transition);
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .filter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .filter-btn:hover::before {
      opacity: 1;
    }

    .filter-btn.active {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3), var(--shadow);
      transform: translateY(-2px);
    }

    .filter-btn-all {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .filter-btn-all.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 12px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      flex-wrap: wrap;
      gap: 8px;
    }

    .stats-bar span {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .stats-bar strong {
      color: var(--gold);
    }

    /* ===== VIEW TOGGLE ===== */
    .view-toggle {
      display: flex;
      gap: 6px;
    }

    .view-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: all var(--transition);
    }

    .view-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ===== GRID / TABLE CONTAINER ===== */
    #pokemon-container {
      transition: opacity 0.25s ease;
    }

    #pokemon-container.loading {
      opacity: 0.4;
    }

    /* ===== CARDS GRID ===== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    /* ===== POKEMON CARD ===== */
    .pokemon-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.4s ease both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .pokemon-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(255, 255, 255, 0.03) 100%);
      pointer-events: none;
    }

    .pokemon-card:hover {
      transform: translateY(-6px);
      border-color: var(--type-color, var(--accent));
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--type-color, var(--accent));
    }

    .card-number {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .card-sprite {
      width: 96px;
      height: 96px;
      margin: 0 auto 12px;
      display: block;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
      transition: transform 0.3s ease;
    }

    .pokemon-card:hover .card-sprite {
      transform: scale(1.12) translateY(-4px);
    }

    .card-name {
      font-weight: 900;
      font-size: 16px;
      text-align: center;
      margin-bottom: 10px;
      color: var(--text);
    }

    .type-badges {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .type-badge {
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: white;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    .card-info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .card-info-label {
      color: var(--text-dim);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 60px;
    }

    .card-info-value {
      color: var(--text-muted);
      font-weight: 600;
      text-align: right;
      font-size: 11px;
    }

    .weakness-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: flex-end;
    }

    .weakness-chip {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 800;
      color: white;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .weakness-4x {
      outline: 2px solid rgba(255, 255, 255, 0.5);
    }

    /* ===== TABLE VIEW ===== */
    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 14px 16px;
      text-align: left;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    th.sortable:hover {
      color: var(--text);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    tbody tr:hover {
      background: var(--surface2);
      cursor: pointer;
    }

    td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    .td-num {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--text-dim);
    }

    .td-sprite {
      width: 48px;
      height: 48px;
      image-rendering: pixelated;
      display: block;
    }

    .td-name {
      font-weight: 800;
      font-size: 14px;
    }

    .td-ability {
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 7, 15, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      transform: scale(0.92) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
    }

    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      padding: 32px 32px 24px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .modal-close:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .modal-number {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .modal-title {
      font-weight: 900;
      font-size: 28px;
      color: var(--text);
      margin-bottom: 12px;
    }

    .modal-sprite {
      width: 120px;
      height: 120px;
      image-rendering: pixelated;
      float: right;
      margin: -60px 0 0 20px;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
    }

    .modal-body {
      padding: 24px 32px 32px;
    }

    .modal-section {
      margin-bottom: 24px;
    }

    .modal-section-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .ability-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ability-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
    }

    .ability-tag {
      font-size: 9px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      background: var(--bg3);
      color: var(--text-dim);
    }

    .ability-tag.hidden {
      background: rgba(248, 88, 136, 0.15);
      color: var(--accent2);
    }

    .evo-chain {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .evo-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: transform var(--transition);
    }

    .evo-step:hover {
      transform: scale(1.08);
    }

    .evo-step img {
      width: 56px;
      height: 56px;
      image-rendering: pixelated;
    }

    .evo-step-name {
      font-size: 11px;
      font-weight: 800;
      color: var(--text);
    }

    .evo-step-num {
      font-size: 9px;
      color: var(--text-dim);
      font-family: 'Press Start 2P', monospace;
    }

    .evo-arrow {
      color: var(--text-dim);
      font-size: 20px;
    }

    .evo-method {
      font-size: 9px;
      color: var(--gold);
      font-weight: 800;
      background: rgba(255, 209, 102, 0.1);
      border: 1px solid rgba(255, 209, 102, 0.2);
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
    }

    .evo-arrow-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .weakness-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .weakness-item {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      color: white;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .mult-label {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 9px;
    }

    .moves-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 6px;
    }

    .move-item {
      padding: 6px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .move-level {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-dim);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .empty-state p {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .empty-state span {
      font-size: 13px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }

    /* ===== ABILITY DROPDOWN ===== */
    .ability-item {
      flex-direction: column;
      align-items: stretch;
      cursor: pointer;
      user-select: none;
      gap: 0;
      padding: 0;
      overflow: hidden;
    }

    .ability-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      transition: background var(--transition);
    }

    .ability-item:hover .ability-header {
      background: var(--surface2);
    }

    .ability-arrow {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }

    .ability-item.open .ability-arrow {
      transform: rotate(180deg);
    }

    .ability-desc {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), padding 0.25s ease;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      padding: 0 12px;
      border-top: 0px solid var(--border);
    }

    .ability-item.open .ability-desc {
      max-height: 120px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }

      header h1 {
        font-size: 11px;
      }

      .modal-body {
        padding: 20px;
      }

      .modal-header {
        padding: 24px 20px 20px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-pokeball">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="none" stroke="#2e3660" stroke-width="4" />
        <path d="M2,50 Q2,2 50,2 Q98,2 98,50 Z" fill="#e63946" opacity="0.9" />
        <path d="M2,50 Q2,98 50,98 Q98,98 98,50 Z" fill="#13162a" opacity="0.9" />
        <line x1="2" y1="50" x2="98" y2="50" stroke="#2e3660" stroke-width="4" />
        <circle cx="50" cy="50" r="14" fill="#1e2440" stroke="#2e3660" stroke-width="4" />
        <circle cx="50" cy="50" r="7" fill="#e63946" />
      </svg>
    </div>
    <h1>POKÉDEX<br />1ª GERAÇÃO</h1>
    <p>Região de Kanto — 151 Pokémon</p>
    <div class="pokemon-count">⭐ Todos os 151 Pokémon</div>

    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Buscar por nome ou número..." autocomplete="off" />
    </div>
  </header>

  <main>
    <div class="filter-section">
      <h2>Filtrar por Tipo</h2>
      <div class="filter-buttons" id="filter-buttons"></div>
    </div>

    // =====================================================
    // SPRITE URL HELPER (PokeAPI sprites)
    // =====================================================
    function spriteUrl(id) {
      return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    }

    // =====================================================
    // TYPE COLORS
    // =====================================================
    const TYPE_COLORS = {
      Normal: "#a8a878", Fire: "#f08030", Water: "#6890f0", Electric: "#f8d030",
      Grass: "#78c850", Ice: "#98d8d8", Fighting: "#c03028", Poison: "#a040a0",
      Ground: "#e0c068", Flying: "#a890f0", Psychic: "#f85888", Bug: "#a8b820",
      Rock: "#b8a038", Ghost: "#705898", Dragon: "#7038f8"
    };

    // =====================================================
    // APP STATE
    // =====================================================
    let activeType = "All";
    let viewMode = "card"; // "card" | "table"
    let searchQuery = "";
    let sortCol = "id";
    let sortDir = 1;

    // =====================================================
    // ALL TYPES (from data)
    // =====================================================
    const ALL_TYPES = [...new Set(POKEMON_DATA.flatMap(p => p.types))].sort();

    // =====================================================
    // FILTER LOGIC
    // =====================================================
    function getFiltered() {
      return POKEMON_DATA.filter(p => {
        const matchType = activeType === "All" || p.types.includes(activeType);
        const matchSearch = !searchQuery ||
          p.name.toLowerCase().includes(searchQuery) ||
          String(p.id).includes(searchQuery);
        return matchType && matchSearch;
      }).sort((a, b) => {
        if (sortCol === "id") return (a.id - b.id) * sortDir;
        if (sortCol === "name") return a.name.localeCompare(b.name) * sortDir;
        return 0;
      });
    }

    // =====================================================
    // RENDER FILTER BUTTONS
    // =====================================================
    function renderFilters() {
      const container = document.getElementById("filter-buttons");
      const allBtn = document.createElement("button");
      allBtn.className = `filter-btn filter-btn-all ${activeType === "All" ? "active" : ""}`;
      allBtn.textContent = "⭐ Todos";
      allBtn.onclick = () => { activeType = "All"; render(); };
      container.appendChild(allBtn);

      ALL_TYPES.forEach(type => {
        const btn = document.createElement("button");
        btn.className = `filter-btn ${activeType === type ? "active" : ""}`;
        btn.textContent = type;
        btn.style.background = TYPE_COLORS[type] || "#888";
        btn.style.color = "white";
        btn.onclick = () => { activeType = type; render(); };
        container.appendChild(btn);
      });
    }

    // =====================================================
    // RENDER CARDS
    // =====================================================
    function renderCards(pokemon) {
      const grid = document.createElement("div");
      grid.className = "cards-grid";

      pokemon.forEach((p, i) => {
        const card = document.createElement("div");
        card.className = "pokemon-card";
        const color = TYPE_COLORS[p.types[0]] || "#888";
        card.style.setProperty("--type-color", color);
        card.style.animationDelay = `${Math.min(i * 0.04, 0.6)}s`;

        const abilities = [
          ...p.abilities,
          ...(p.hiddenAbility ? [p.hiddenAbility + " (H)"] : [])
        ].join(", ");

        const evoNames = p.evolution.chain.map(id => {
          const evo = POKEMON_DATA.find(x => x.id === id);
          return evo ? evo.name : "?";
        });
        const evoText = evoNames.length > 1 ? evoNames.join(" → ") : "Sem evolução";

        const weaknesses = [
          ...(p.weaknesses["4x"] || []).map(t => `<span class="weakness-chip weakness-4x" style="background:${TYPE_COLORS[t] || "#888"}">${t} 4×</span>`),
          ...(p.weaknesses["2x"] || []).map(t => `<span class="weakness-chip" style="background:${TYPE_COLORS[t] || "#888"}">${t} 2×</span>`)
        ].join("") || "<span style='color:var(--text-dim);font-size:11px'>Nenhuma</span>";

        card.innerHTML = `
      <div class="card-number">#${String(p.id).padStart(3, "0")}</div>
      <img class="card-sprite" src="${spriteUrl(p.id)}" alt="${p.name}" loading="lazy" />
      <div class="card-name">${p.name}</div>
      <div class="type-badges">${p.types.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t] || "#888"}">${t}</span>`).join("")}</div>
      <div class="card-divider"></div>
      <div class="card-info-row">
        <span class="card-info-label">Ability</span>
        <span class="card-info-value">${p.abilities.join(", ")}</span>
      </div>
      <div class="card-info-row">
        <span class="card-info-label">Evolução</span>
        <span class="card-info-value" style="font-size:10px">${evoText}</span>
      </div>
      <div class="card-info-row">
        <span class="card-info-label">Fraquezas</span>
        <span class="card-info-value"><div class="weakness-chips">${weaknesses}</div></span>
      </div>
    `;
        card.onclick = () => openModal(p);
        grid.appendChild(card);
      });

      return grid;
    }

    // =====================================================
    // RENDER TABLE
    // =====================================================
    function renderTable(pokemon) {
      const wrapper = document.createElement("div");
      wrapper.className = "table-wrapper";

      const makeHeader = (label, col) => `<th class="sortable" data-col="${col}">${label} ${sortCol === col ? (sortDir > 0 ? "↑" : "↓") : ""}</th>`;

      const rows = pokemon.map(p => {
        const evoText = p.evolution.chain.length > 1
          ? p.evolution.chain.map(id => POKEMON_DATA.find(x => x.id === id)?.name || "?").join(" → ")
          : "—";
        const weakList = [
          ...(p.weaknesses["4x"] || []).map(t => `<span class="weakness-chip weakness-4x" style="background:${TYPE_COLORS[t] || "#888"};font-size:9px">${t}×4</span>`),
          ...(p.weaknesses["2x"] || []).map(t => `<span class="weakness-chip" style="background:${TYPE_COLORS[t] || "#888"};font-size:9px">${t}</span>`)
        ].join(" ");

        return `<tr onclick="openModalById(${p.id})">
      <td><img class="td-sprite" src="${spriteUrl(p.id)}" alt="${p.name}" loading="lazy"/></td>
      <td class="td-num">#${String(p.id).padStart(3, "0")}</td>
      <td class="td-name">${p.name}</td>
      <td><div class="type-badges" style="justify-content:flex-start">${p.types.map(t => `<span class="type-badge" style="background:${TYPE_COLORS[t] || "#888"}">${t}</span>`).join("")}</div></td>
      <td class="td-ability">${[...p.abilities, ...(p.hiddenAbility ? [p.hiddenAbility + " (H)"] : [])].join(", ")}</td>
      <td style="font-size:11px;color:var(--text-muted)">${evoText}</td>
      <td><div style="display:flex;flex-wrap:wrap;gap:3px">${weakList}</div></td>
    </tr>`;
      }).join("");

      wrapper.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Sprite</th>
          ${makeHeader("Nº", "id")}
          ${makeHeader("Nome", "name")}
          <th>Tipo(s)</th>
          <th>Abilities</th>
          <th>Evolução</th>
          <th>Fraquezas</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;

      wrapper.querySelectorAll("th.sortable").forEach(th => {
        th.onclick = () => {
          const col = th.dataset.col;
          if (sortCol === col) sortDir *= -1;
          else { sortCol = col; sortDir = 1; }
          render();
        };
      });

      return wrapper;
    }

    // =====================================================
    // MAIN RENDER
    // =====================================================
    function render() {
      // Update filter buttons
      document.getElementById("filter-buttons").innerHTML = "";
      renderFilters();

      const filtered = getFiltered();
      const container = document.getElementById("pokemon-container");
      container.innerHTML = "";

      document.getElementById("count-display").textContent = filtered.length;
      document.getElementById("active-filter-label").textContent =
        activeType !== "All" ? `Tipo: ${activeType}` : "";

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><p>🔍</p><p>Nenhum Pokémon encontrado</p><span>Tente outro filtro ou nome</span></div>`;
        return;
      }

      if (viewMode === "card") {
        container.appendChild(renderCards(filtered));
      } else {
        container.appendChild(renderTable(filtered));
      }
    }

    function buildAbilityItem(tag, name, isHidden = false) {
      const desc = ABILITY_DESCRIPTIONS[name] || "Descrição não disponível para esta ability.";

      <div class="ability-header">
        <span class="ability-tag ${isHidden ? "hidden" : ""}">${tag}</span>

    function openModal(p) {
      const overlay = document.getElementById("modal-overlay");

      document.getElementById("modal-number").textContent = `#${String(p.id).padStart(3, "0")}`;
      document.getElementById("modal-title").textContent = p.name;
      document.getElementById("modal-sprite").src = spriteUrl(p.id);
      document.getElementById("modal-sprite").alt = p.name;

      // Types
      const typesEl = document.getElementById("modal-types");
      typesEl.innerHTML = p.types.map(t =>
        `<span class="type-badge" style="background:${TYPE_COLORS[t] || "#888"}">${t}</span>`
      ).join("");

      // Header gradient
      const headerEl = document.getElementById("modal-header");
      const color = TYPE_COLORS[p.types[0]] || "#888";
      headerEl.style.background = `linear-gradient(135deg, ${color}18 0%, transparent 70%)`;
      headerEl.style.borderBottom = `1px solid ${color}33`;

      // Abilities
      // Abilities
      const abEl = document.getElementById("modal-abilities");
      abEl.innerHTML = [
        ...p.abilities.map(a => buildAbilityItem("Normal", a)),
        ...(p.hiddenAbility ? [buildAbilityItem("Oculta", p.hiddenAbility, true)] : [])
      ].join("");

      // Adiciona toggle
      abEl.querySelectorAll(".ability-item").forEach(item => {
        item.addEventListener("click", () => {
          const isOpen = item.classList.contains("open");
          abEl.querySelectorAll(".ability-item").forEach(i => i.classList.remove("open"));
          if (!isOpen) item.classList.add("open");
        });
      });

      // Evolution chain
      const evoEl = document.getElementById("modal-evo");
      if (p.evolution.chain.length <= 1) {
        evoEl.innerHTML = `<span style="color:var(--text-dim);font-size:13px">Este Pokémon não evolui.</span>`;
      } else {
        evoEl.innerHTML = p.evolution.chain.map((id, i) => {
          const evo = POKEMON_DATA.find(x => x.id === id);
          if (!evo) return "";
          const method = p.evolution.methods[i - 1] || "";
          const arrow = i > 0 ? `<div class="evo-arrow-col"><span class="evo-arrow">→</span><span class="evo-method">${method}</span></div>` : "";
          return `${arrow}<div class="evo-step" onclick="openModalById(${id})">
        <img src="${spriteUrl(id)}" alt="${evo.name}"/>
        <span class="evo-step-name">${evo.name}</span>
        <span class="evo-step-num">#${String(id).padStart(3, "0")}</span>
      </div>`;
        }).join("");
      }

      // Weaknesses
      const wkEl = document.getElementById("modal-weaknesses");
      const all4x = (p.weaknesses["4x"] || []).map(t =>
        `<div class="weakness-item" style="background:${TYPE_COLORS[t] || "#888"}">${t} <span class="mult-label">4×</span></div>`);
      const all2x = (p.weaknesses["2x"] || []).map(t =>
        `<div class="weakness-item" style="background:${TYPE_COLORS[t] || "#888"}">${t} <span class="mult-label">2×</span></div>`);
      wkEl.innerHTML = [...all4x, ...all2x].join("") || `<span style="color:var(--text-dim);font-size:13px">Nenhuma</span>`;

      // Resistances
      const rsEl = document.getElementById("modal-resistances");
      const immune = (p.resistances.immune || []).map(t =>
        `<div class="weakness-item" style="background:#333;border:1px solid #555">${t} <span class="mult-label">0×</span></div>`);
      const quart = (p.resistances["0.25x"] || []).map(t =>
        `<div class="weakness-item" style="background:${TYPE_COLORS[t] || "#888"};opacity:0.7">${t} <span class="mult-label">¼×</span></div>`);
      const half = (p.resistances["0.5x"] || []).map(t =>
        `<div class="weakness-item" style="background:${TYPE_COLORS[t] || "#888"};opacity:0.6">${t} <span class="mult-label">½×</span></div>`);
      rsEl.innerHTML = [...immune, ...quart, ...half].join("") || `<span style="color:var(--text-dim);font-size:13px">Nenhuma</span>`;

      // Level Moves
      const lvEl = document.getElementById("modal-level-moves");
      lvEl.innerHTML = (p.levelMoves || []).map(m =>
        `<div class="move-item">${m.move}<span class="move-level">Lv.${m.lv}</span></div>`
      ).join("") || `<span style="color:var(--text-dim);font-size:12px">Nenhum</span>`;

      // TM Moves
      const tmEl = document.getElementById("modal-tm-moves");
      tmEl.innerHTML = (p.tmMoves || []).map(m =>
        `<div class="move-item">${m}</div>`
      ).join("") || `<span style="color:var(--text-dim);font-size:12px">Nenhum</span>`;

      overlay.classList.add("open");
      document.body.style.overflow = "hidden";

      // Scroll modal to top
      document.getElementById("modal").scrollTop = 0;
    }

    function openModalById(id) {
      const p = POKEMON_DATA.find(x => x.id === id);
      if (p) openModal(p);
    }

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("open");
      document.body.style.overflow = "";
    }

    // =====================================================
    // EVENT LISTENERS
    // =====================================================
    document.getElementById("modal-close").onclick = closeModal;
    document.getElementById("modal-overlay").onclick = (e) => {
      if (e.target === e.currentTarget) closeModal();
    };
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    document.getElementById("search-input").oninput = (e) => {
      searchQuery = e.target.value.toLowerCase().trim();
      render();
    };

    document.getElementById("btn-card").onclick = () => {
      viewMode = "card";
      document.getElementById("btn-card").classList.add("active");
      document.getElementById("btn-table").classList.remove("active");
      render();
    };

    document.getElementById("btn-table").onclick = () => {
      viewMode = "table";
      document.getElementById("btn-table").classList.add("active");
      document.getElementById("btn-card").classList.remove("active");
      render();
    };

    // =====================================================
    // INIT
    // =====================================================
    renderFilters();
    render();
  </script>
</body>

</html>
